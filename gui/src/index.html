<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperCompress</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="/main.js" defer></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>HyperCompress</h1>
      <span class="subtitle">Content-Aware Compression</span>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="compress">Compress</button>
      <button class="tab" data-tab="decompress">Extract</button>
      <button class="tab" data-tab="analyze">Analyze</button>
    </div>

    <div class="panel active" id="compress">
      <div class="drop-zone" id="compress-drop">
        <div class="drop-icon">⬇</div>
        <p>Drop file or folder</p>
        <span class="muted">or click to browse</span>
      </div>
      <div class="selected-file" id="compress-file" style="display:none"></div>

      <div class="controls">
        <div class="field">
          <label>Compression method</label>
          <select id="level">
            <option value="0">Store (no compression)</option>
            <option value="1">Fastest</option>
            <option value="3">Fast</option>
            <option value="6" selected>Normal</option>
            <option value="7">Good</option>
            <option value="9">Best</option>
          </select>
        </div>
        <div class="field">
          <label>Password <span class="muted">(optional — AES-256)</span></label>
          <input type="password" id="encrypt-pw" placeholder="Leave empty for no encryption" />
        </div>
      </div>

      <button class="btn primary" id="compress-btn" disabled>Compress</button>
    </div>

    <div class="panel" id="decompress">
      <div class="drop-zone" id="decompress-drop">
        <div class="drop-icon">⬆</div>
        <p>Drop .hc file</p>
        <span class="muted">or click to browse</span>
      </div>
      <div class="selected-file" id="decompress-file" style="display:none"></div>

      <div class="controls">
        <div class="field">
          <label>Password <span class="muted">(if encrypted)</span></label>
          <input type="password" id="decrypt-pw" placeholder="Leave empty if not encrypted" />
        </div>
      </div>

      <button class="btn primary" id="decompress-btn" disabled>Extract</button>
    </div>

    <div class="panel" id="analyze">
      <div class="drop-zone" id="analyze-drop">
        <div class="drop-icon">◎</div>
        <p>Drop file to analyze</p>
        <span class="muted">or click to browse</span>
      </div>
      <div class="selected-file" id="analyze-file" style="display:none"></div>

      <button class="btn primary" id="analyze-btn" disabled>Analyze</button>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-info">
        <span id="progress-pct">0%</span>
        <span id="progress-msg"></span>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <!-- MODAL POPUP -->
  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal">
      <div class="modal-icon" id="modal-icon"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-body" id="modal-body"></div>
      <button class="btn primary modal-ok" id="modal-ok">OK</button>
    </div>
  </div>
</body>
</html>
